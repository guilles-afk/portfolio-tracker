<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Tracker GUILLE Y MER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="margin:0;background:#0f172a;font-family:Arial;color:white;">

<div style="max-width:600px;margin:auto;padding:20px;">

<h1 style="text-align:center;">Portfolio Tracker</h1>

<div style="background:#1e293b;padding:15px;border-radius:12px;margin-bottom:20px;">
  <input id="name" placeholder="BTC, ETH, AAPL, USD" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">
  
  <input id="quantity" type="number" placeholder="Cantidad" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">

  <select id="type" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">
    <option value="crypto">Crypto</option>
    <option value="stock">Stock</option>
    <option value="cash">Cash</option>
  </select>

  <button onclick="addAsset()" style="width:100%;padding:12px;border:none;border-radius:8px;background:#3b82f6;color:white;font-weight:bold;">
    Agregar
  </button>
</div>

<h2>Total: $<span id="total">0</span></h2>

<div id="list"></div>

</div>

<script>
let assets = JSON.parse(localStorage.getItem("assets") || "[]");

const cryptoMap = {
  BTC: "bitcoin",
  ETH: "ethereum",
  SOL: "solana",
  USDT: "tether",
  USDC: "usd-coin",
  BNB: "binancecoin",
  XRP: "ripple",
  ADA: "cardano",
  DOGE: "dogecoin",
  MATIC: "polygon",
  HYPE: "hyperliquid"
};

function normalizeCrypto(name) {
  name = name.toUpperCase();
  return cryptoMap[name] || name.toLowerCase();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0;

  assets.forEach((a, i) => {
    let value = (a.price || 0) * a.quantity;
    total += value;

    list.innerHTML += `
      <div style="background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px;display:flex;justify-content:space-between;">
        <div>
          <b>${a.symbol}</b><br>
          ${a.quantity} × $${a.price || 0}
        </div>
        <div style="text-align:right;">
          $${value.toFixed(2)}<br>
          <button onclick="removeAsset(${i})" style="margin-top:5px;border:none;background:red;color:white;border-radius:6px;padding:5px 8px;">X</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  localStorage.setItem("assets", JSON.stringify(assets));
}

async function updatePrices() {
  for (let a of assets) {

    if (a.type === "crypto") {
      try {
        let res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${a.id}&vs_currencies=usd`);
        let data = await res.json();
        a.price = data[a.id]?.usd || 0;
      } catch {}
    }

    if (a.type === "stock") {
      try {
        let res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${a.symbol}`);
        let data = await res.json();
        a.price = data.quoteResponse.result[0]?.regularMarketPrice || 0;
      } catch {}
    }

    if (a.type === "cash") {
      a.price = 1;
    }
  }

  render();
}

function addAsset() {
  let name = document.getElementById("name").value.trim();
  let type = document.getElementById("type").value;
  let quantity = parseFloat(document.getElementById("quantity").value);

  if (!name || !quantity) return;

  let asset = {
    symbol: name.toUpperCase(),
    type,
    quantity,
    price: 0
  };

  if (type === "crypto") {
    asset.id = normalizeCrypto(name);
  }

  assets.push(asset);
  render();
}

function removeAsset(i) {
  assets.splice(i, 1);
  render();
}

render();
updatePrices();
setInterval(updatePrices, 60000);
</script>

</body>
</html>
