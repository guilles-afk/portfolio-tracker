<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Tracker</title>
</head>
<body style="background:#0f172a;color:white;font-family:Arial;padding:20px;">

<h1>Portfolio Tracker</h1>

<input id="name" placeholder="BTC, ETH, AAPL, USD">
<input id="quantity" type="number" placeholder="Cantidad">
<select id="type">
  <option value="crypto">Crypto</option>
  <option value="stock">Stock</option>
  <option value="cash">Cash</option>
</select>

<button onclick="addAsset()">Agregar</button>

<h2>Assets</h2>
<div id="list"></div>

<h2>Total: $<span id="total">0</span></h2>

<script>
let assets = JSON.parse(localStorage.getItem("assets") || "[]");

// 🔥 MAPEOS AUTOMÁTICOS
const cryptoMap = {
  BTC: "bitcoin",
  ETH: "ethereum",
  SOL: "solana",
  USDT: "tether",
  USDC: "usd-coin",
  BNB: "binancecoin",
  XRP: "ripple",
  ADA: "cardano",
  DOGE: "dogecoin",
  MATIC: "polygon",
  HYPE: "hyperliquid" // 👈 agregado
};

function normalizeCrypto(name) {
  name = name.toUpperCase();
  return cryptoMap[name] || name.toLowerCase();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0;

  assets.forEach((a, i) => {
    let value = (a.price || 0) * a.quantity;
    total += value;

    list.innerHTML += `
      <div style="background:#1e293b;padding:10px;margin:5px;border-radius:8px;">
        <b>${a.symbol}</b> (${a.type})<br>
        ${a.quantity} × $${a.price || 0} = $${value.toFixed(2)}
        <br><button onclick="removeAsset(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  localStorage.setItem("assets", JSON.stringify(assets));
}

async function updatePrices() {
  for (let a of assets) {

    // 🔹 CRYPTO
    if (a.type === "crypto") {
      try {
        let res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${a.id}&vs_currencies=usd`);
        let data = await res.json();
        a.price = data[a.id]?.usd || 0;
      } catch {}
    }

    // 🔹 STOCK
    if (a.type === "stock") {
      try {
        let res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${a.symbol}`);
        let data = await res.json();
        a.price = data.quoteResponse.result[0]?.regularMarketPrice || 0;
      } catch {}
    }

    // 🔹 CASH
    if (a.type === "cash") {
      a.price = 1;
    }
  }

  render();
}

function addAsset() {
  let name = document.getElementById("name").value.trim();
  let type = document.getElementById("type").value;
  let quantity = parseFloat(document.getElementById("quantity").value);

  if (!name || !quantity) return;

  let asset = {
    symbol: name.toUpperCase(),
    type,
    quantity,
    price: 0
  };

  if (type === "crypto") {
    asset.id = normalizeCrypto(name);
  }

  assets.push(asset);
  render();
}

function removeAsset(i) {
  assets.splice(i, 1);
  render();
}

render();
updatePrices();
setInterval(updatePrices, 60000);
</script>

</body>
</html>
